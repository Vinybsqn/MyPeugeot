  <path d="M68 148 Q68 125 88 120 Q108 115 128 125 Q148 133 148 148" fill="#B03A2E"/>
  <!-- Rear wheel arch -->
  <path d="M258 148 Q258 125 278 120 Q298 115 318 125 Q338 133 338 148" fill="#B03A2E"/>
  <!-- Front wheel -->
  <circle cx="108" cy="148" r="24" fill="#1a1a1a"/>
  <circle cx="108" cy="148" r="17" fill="#2a2a2a"/>
  <circle cx="108" cy="148" r="10" fill="#3a3a3a"/>
  <circle cx="108" cy="148" r="4" fill="#888"/>
  <!-- Rear wheel -->
  <circle cx="298" cy="148" r="24" fill="#1a1a1a"/>
  <circle cx="298" cy="148" r="17" fill="#2a2a2a"/>
  <circle cx="298" cy="148" r="10" fill="#3a3a3a"/>
  <circle cx="298" cy="148" r="4" fill="#888"/>
  <!-- Grille -->
  <path d="M48 122 Q52 118 65 116 Q72 115 78 118 Q70 120 60 124 Z" fill="rgba(0,0,0,0.5)"/>
