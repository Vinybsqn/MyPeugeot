  <rect x="168" y="110" width="18" height="4" rx="2" fill="rgba(0,0,0,0.3)"/>
  <rect x="222" y="110" width="18" height="4" rx="2" fill="rgba(0,0,0,0.3)"/>
  <!-- Front lights -->
  <path d="M42 118 Q46 112 58 110 Q65 109 70 112 Q60 114 52 120 Z" fill="rgba(255,240,200,0.9)"/>
  <ellipse cx="56" cy="116" rx="8" ry="5" fill="rgba(255,240,180,0.5)"/>
  <!-- Rear lights -->
  <path d="M355 115 Q362 110 368 118 Q365 122 358 124 Q350 122 348 116 Z" fill="#FF6B6B"/>
  <ellipse cx="358" cy="118" rx="7" ry="5" fill="rgba(255,100,100,0.6)"/>
