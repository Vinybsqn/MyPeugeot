  <circle cx="80" cy="118" r="5" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  <!-- Highlight -->
  <path d="M160 65 Q185 52 220 50 Q255 49 280 62" stroke="rgba(255,255,255,0.2)" stroke-width="3" stroke-linecap="round"/>
