  <path d="M40 130 Q45 100 80 90 Q110 82 145 78 Q170 60 200 55 Q230 50 255 55 Q280 58 300 75 Q325 82 345 95 Q365 105 368 130 Z" fill="#C0392B"/>
  <path d="M40 130 Q45 100 80 90 Q110 82 145 78 Q170 60 200 55 Q230 50 255 55 Q280 58 300 75 Q325 82 345 95 Q365 105 368 130 L368 148 Q350 155 200 158 Q80 158 40 148 Z" fill="#E74C3C"/>
